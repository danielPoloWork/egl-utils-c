name: ci

# Enterprise CI gate for d4np-c, generated by EAAO.
# Implements the quality bar in AGENTS.md §10 across the toolchain matrix from the
# language profile. The build/test/format/lint commands come from project.yaml; the
# setup steps and language-specific extra jobs come from the profile.

on:
  pull_request:
  push:
    branches: [master]
  workflow_call:

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on main (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform build + test matrix (from the language profile).
  # ---------------------------------------------------------------------------
  build:
    name: build / ${{ matrix.os }} / ${{ matrix.toolchain }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, toolchain: gcc, preset: debug }
          - { os: ubuntu-24.04, toolchain: gcc, preset: release }
          - { os: ubuntu-24.04, toolchain: clang, preset: asan }
          - { os: ubuntu-24.04, toolchain: clang, preset: ubsan }
          - { os: windows-2022, toolchain: msvc, preset: debug }
          - { os: macos-14, toolchain: apple-clang, preset: debug }
    steps:
      - name: Check out the source tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install a recent CMake and Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - name: Set up MSVC environment
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }

      - name: Configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # ---------------------------------------------------------------------------
  # Cross-artifact congruence — the agent-runnable consistency lint.
  # ---------------------------------------------------------------------------
  consistency:
    name: consistency / lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # i18n/version checks need full history
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Run the consistency lint
        run: python tools/consistency_lint.py

  # ---------------------------------------------------------------------------
  # Language-specific quality jobs (format, lint, sanitizers, …) from the profile.
  # ---------------------------------------------------------------------------
  format:
    name: format / clang-format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install a pinned clang-format (deterministic across machines)
        run: python -m pip install "clang-format==22.1.5"
      - name: Verify all C sources are clean
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.c' '*.h')
          [[ ${#files[@]} -eq 0 ]] && exit 0
          clang-format --dry-run --Werror "${files[@]}"
  cppcheck:
    name: cppcheck / static analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: cppcheck --enable=warning,portability --error-exitcode=1 d4np/
  valgrind:
    name: valgrind / leak-check=full
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Build the unit tests
        run: cmake --preset debug && cmake --build --preset debug
      - name: Run the unit tests under Valgrind
        # --fair-sched=yes timeslices threads round-robin so a busy-wait spin loop (the SPSC
        # ring-buffer test) cannot starve its peer under Valgrind's serialized scheduler.
        run: valgrind --fair-sched=yes --leak-check=full --error-exitcode=1 ./build/debug/d4np_tests

  # Reproducible performance gate — runs only when the project has a benchmark suite.
  benchmark:
    name: benchmark / reproducible perf
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install a recent CMake and Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - name: Set up MSVC environment
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }
      - name: Build the benchmark suite
        shell: bash
        run: cmake --preset bench && cmake --build --preset bench
      - name: Enforce the performance gate (fails on a catastrophic regression)
        shell: bash
        run: ./build/bench/d4np_perf_gate


  # Data-race / concurrency gate — runs only when the project exposes concurrency.
  tsan:
    name: tsan / thread sanitizer
    runs-on: ubuntu-24.04
    env: { CC: clang }
    steps:
      - uses: actions/checkout@v7
      - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - name: Build + test under ThreadSanitizer
        run: cmake --preset tsan && cmake --build --preset tsan && ctest --preset tsan --output-on-failure

  # Line-coverage gate (M8.1) — fails the build below 80% over d4np/. See ADR-0003.
  coverage:
    name: coverage / line gate >=80%
    runs-on: ubuntu-24.04
    env: { CC: gcc }
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install gcovr
        run: python -m pip install --upgrade gcovr
      - name: Build, test, and enforce the coverage gate
        run: tools/coverage.sh 80
      - name: Upload the HTML coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage/html
          if-no-files-found: ignore

  # API documentation gate (M8.2) — Doxygen must build with zero warnings. See ADR-0004.
  docs:
    name: docs / doxygen warnings-as-errors
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Doxygen + Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build the API docs (WARN_AS_ERROR fails on any warning)
        run: doxygen docs/Doxyfile
      - name: Upload the HTML API docs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: docs/doxygen/html
          if-no-files-found: ignore

  # Install/export gate (M8.3) — prove `find_package(d4np-c)` works against a real install
  # prefix on every platform. See ADR-0005.
  install:
    name: install / find_package consumer / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }
      - name: Configure, build, and install d4np-c
        shell: bash
        run: |
          cmake -S . -B build/install -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DD4NP_BUILD_TESTS=OFF -DD4NP_INSTALL=ON
          cmake --build build/install
          cmake --install build/install --prefix "$PWD/_prefix"
      - name: Build the find_package consumer against the install prefix
        shell: bash
        run: |
          cmake -S packaging/consumer-test -B build/consumer -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PWD/_prefix"
          cmake --build build/consumer
          ctest --test-dir build/consumer --output-on-failure

  # Broad-reach conformance gate (M8.4) — the library must compile as strict ISO C11 with no
  # compiler extensions (-pedantic-errors) on every GCC/Clang toolchain. MSVC conformance is
  # covered by /permissive- in the build matrix. See ADR-0006 + docs/development/compatibility.md.
  pedantic:
    name: pedantic / strict C11 / ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, toolchain: gcc,   cc: gcc }
          - { os: ubuntu-24.04, toolchain: clang, cc: clang }
          - { os: macos-14,     toolchain: apple-clang, cc: clang }
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - name: Build the library under -std=c11 -pedantic-errors
        shell: bash
        run: cmake --preset pedantic && cmake --build --preset pedantic

