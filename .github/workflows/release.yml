name: release

# Release workflow for d4np-c, generated by EAAO.
# Fires on an annotated SemVer tag push and prepares a *draft* GitHub Release. Publishing is
# the deliberate human checkpoint (AGENTS.md §11 / docs/workflow/release.md) — this workflow
# never publishes, it only drafts so a maintainer can review and press "Publish".

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

# Serialize per-tag, but NEVER cancel an in-flight release — a half-run publish is worse
# than a queued one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft-release:
    name: draft GitHub Release for ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the tagged tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install a recent CMake and Ninja
        uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
      - name: Set up MSVC environment
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }

      - name: Build (verify the tag builds clean)
        shell: bash
        run: cmake --build --preset debug

      - name: Draft the release (a human publishes it)
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
