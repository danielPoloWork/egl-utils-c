# project.yaml — single source of truth for the generated repository: d4np-c.
# Filled from spec-d4np-utils-c.md + profiles/c.yaml + intake interview answers.
# Confirm with the maintainer BEFORE rendering (interview.md → Closing the interview).
#
# NOTE ON SOURCE LAYOUT: the maintainer chose a flat, module-oriented tree
# (d4np/<module>/, tests/<module>/, bench/<module>/) instead of the renderer's default
# src/main/<lang>/<group>/<slug>/. The renderer cannot express this, so the generated repo
# is restructured post-render and the deviation is recorded in the generated repo's ADR-0002.

identity:
  project_name:    d4np-c
  project_slug:    d4np                         # -> C symbol prefix "d4np_" (matches the spec exactly)
  project_title:   C Systems Utility Library
  project_tagline: a dependency-free, high-performance C11 systems utility library (allocators, containers, concurrency, strings, I/O, diagnostics)
  project_series:  ""                           # standalone; no umbrella series
  project_kind:    library

ownership:
  owner:           danielPoloWork
  maintainer:      Daniel Polo
  author:          Daniel Polo
  year:            "2026"
  license_id:      MIT
  default_branch:  main
  assignee:        "@me"

language:
  lang:            c
  lang_name:       C11
  lang_standard:   C11 (ISO/IEC 9899:2011)
  secondary_lang:  ""
  group_path:      it/d4np
  group_dotted:    it.d4np
  namespace:       "d4np_"                       # C has no namespaces; symbol prefix per profile pattern
  src_ext:         c
  public_include_hint: '#include "d4np_c.h"'     # umbrella public header (spec §3)

toolchain:                                        # defaults from profiles/c.yaml
  build_tool:      CMake + Ninja
  pkg_manager:     vcpkg / Conan (test deps only; library stays dependency-free)
  test_framework:  Unity
  formatter:       clang-format
  linter:          clang-tidy + cppcheck
  sanitizers:      ASan, UBSan, TSan, Valgrind
  coverage_tool:   llvm-cov / gcovr
  coverage_target: 80
  doc_tool:        Doxygen
  version_file:    version.h
  version_const_hint: D4NP_VERSION_*
  package_ecosystem: ""                          # no Dependabot ecosystem for vcpkg/Conan
  commands:
    build:        cmake --build --preset debug
    test:         ctest --preset debug --output-on-failure
    format_check: clang-format --dry-run --Werror <files>
    lint:         clang-tidy --warnings-as-errors='*' <changed .c/.h>
    bench:        cmake --build --preset bench

ci:                                               # from profiles/c.yaml
  tier1_platforms: "Linux x86_64 (GCC>=11, Clang>=14), Windows x86_64 (MSVC>=19.30), macOS arm64 (Apple Clang>=14)"
  matrix:
    - { os: ubuntu-24.04, toolchain: gcc,         preset: debug }
    - { os: ubuntu-24.04, toolchain: gcc,         preset: release }
    - { os: ubuntu-24.04, toolchain: clang,       preset: asan }
    - { os: ubuntu-24.04, toolchain: clang,       preset: ubsan }
    - { os: windows-2022, toolchain: msvc,        preset: debug }
    - { os: macos-14,     toolchain: apple-clang, preset: debug }
  setup_steps: |
    - name: Install a recent CMake and Ninja
      uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
    - name: Set up MSVC environment
      if: matrix.toolchain == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1
      with: { arch: x64 }
  extra_jobs: |
    format:
      name: format / clang-format check
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - name: Verify all C sources are clean
          shell: bash
          run: |
            mapfile -t files < <(git ls-files '*.c' '*.h')
            [[ ${#files[@]} -eq 0 ]] && exit 0
            clang-format --dry-run --Werror "${files[@]}"
    cppcheck:
      name: cppcheck / static analysis
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - run: sudo apt-get update && sudo apt-get install -y cppcheck
        - run: cppcheck --enable=warning,portability --error-exitcode=1 d4np/
    valgrind:
      name: valgrind / leak-check=full
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
        - run: sudo apt-get update && sudo apt-get install -y valgrind
        - name: Build the unit tests
          run: cmake --preset debug && cmake --build --preset debug
        - name: Run the unit tests under Valgrind
          run: valgrind --leak-check=full --error-exitcode=1 ./build/debug/d4np_tests
  race_job: |
    tsan:
      name: tsan / thread sanitizer
      runs-on: ubuntu-24.04
      env: { CC: clang }
      steps:
        - uses: actions/checkout@v6
        - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
        - name: Build + test under ThreadSanitizer
          run: cmake --preset tsan && cmake --build --preset tsan && ctest --preset tsan --output-on-failure

governance:
  scopes: [mem, ds, concurrency, str, io, sys, build, tests, docs, ci]
  version_start: "pre-1.0 milestone-driven"
  start_version: "0.0.0"
  house_rules: ""
  capabilities:
    bench:      true
    threading:  true
    public_api: true
    i18n:       false
    packaging:  true
    service:    false
    announce:   false

i18n:
  default_lang: "en"
  targets: []

announce:
  channels: []

spec:
  objective: >
    d4np-c is a static/dynamic ANSI/C11 library providing high-performance data structures and
    system utilities for systems programmers. It removes three recurring pains: allocation
    jitter and fragmentation on hot paths (via explicit custom allocators — arena and fixed-block
    pool), the absence of a cohesive, cache-friendly container/concurrency toolkit in portable C,
    and non-deterministic error handling. Design pillars: explicit memory management (every data
    structure accepts a d4np_allocator_t, never calling malloc/free directly), deterministic
    error handling (constant d4np_status_t return codes plus a thread-local error context), and
    zero-cost, cache-aligned abstractions that minimize cache misses.
  functional_reqs:
    - "Allocators: d4np_arena_init / d4np_arena_alloc (O(1)) / d4np_arena_reset (bulk free, keep main block); d4np_pool_init / d4np_pool_alloc / d4np_pool_free (O(1) fixed-block, fragmentation-free)."
    - "Generic containers: d4np_vector_t (dynamic array, geometric growth), d4np_hashmap_t (open addressing + linear probing), d4np_linked_list_t (intrusive doubly-linked), d4np_ring_buffer_t (thread-safe SPSC circular queue), d4np_string_builder_t (efficient dynamic string assembly)."
    - "Concurrency: d4np_mutex_t (portable over pthread/win32), d4np_thread_pool_t (native threads + internal task queue), d4np_atomic_queue_t (lock-free SPSC via C11 atomics), d4np_semaphore_t (system semaphore for inter-process sync)."
    - "Strings & parsing: d4np_str_view_t (non-owning const char* + len), d4np_str_split / d4np_str_view_split_next (zero-allocation tokenization), d4np_str_parse_int / d4np_str_parse_float (overflow-safe conversion returning d4np_status_t)."
    - "File system & I/O: d4np_file_read_all (whole file into a dynamic buffer with error handling), d4np_file_write_all (atomic write + flush), d4np_path_combine (OS-separator-aware safe join)."
    - "System utilities & diagnostics: d4np_log_write (leveled INFO/WARN/ERROR logger, console or file), d4np_error_context_push / d4np_error_context_pop (thread-local error tracking), d4np_timestamp_ms (monotonic millisecond clock), d4np_uuid_generate (RFC4122 v4), d4np_hash_fnv1a (FNV-1a over strings and binary buffers)."
  nonfunctional_reqs:
    - "Dependency-free at library scope: depends only on the C11 standard library; test/bench deps (Unity) are gated behind CMake options."
    - "Standard & portability: C11 (ISO/IEC 9899:2011); Tier-1 on Linux x86_64 (GCC>=11, Clang>=14), Windows x86_64 (MSVC>=19.30), macOS arm64 (Apple Clang>=14)."
    - "Performance: O(1) arena/pool allocation; cache-aligned, cache-miss-minimizing layouts; lock-free SPSC queue; perf claims proven by a reproducible benchmark suite, not asserted."
    - "Correctness & safety: zero leaks under Valgrind leak-check=full; clean under ASan/UBSan; thread-safety of concurrent primitives proven under ThreadSanitizer; overflow-safe numeric parsing."
    - "Error model: every fallible function returns a constant d4np_status_t; a thread-local error context carries the current message/trace; no hidden global state."
    - "Memory ownership: all data structures take a d4np_allocator_t; the library never calls malloc/free directly; ownership and lifetime documented per API."
    - "Quality gates: >=80% line coverage; clang-format clean; clang-tidy + cppcheck warnings-as-errors."
  architecture: >
    Layered, dependency-free C11. A foundation layer defines the cross-cutting contracts:
    d4np_status_t (status codes), d4np_allocator_t (alloc/realloc/free vtable, defaulting to a
    libc-backed allocator), and the thread-local error context. Above it sit four independent
    modules that all consume the foundation: (1) Allocators — arena (bump pointer over one block,
    O(1) alloc, O(1) bulk reset) and fixed-block pool (intrusive free-list, O(1) alloc/free);
    (2) Containers — vector, hashmap (open addressing/linear probing), intrusive linked list,
    SPSC ring buffer, string builder; (3) Concurrency — portable mutex/semaphore shim over
    pthread/win32, thread pool with an internal task queue, and a lock-free SPSC atomic queue
    built on <stdatomic.h>; (4) Strings/IO/Sys — string views + zero-alloc split, overflow-safe
    parsers, whole-file read/atomic-write, OS-aware path join, leveled logger, monotonic clock,
    UUIDv4, and FNV-1a hashing. Public surface is exposed through a single umbrella header
    d4np_c.h that includes the per-module headers.

        consumer ──#include "d4np_c.h"──> [ status | allocator | error-context ]   (foundation)
                                            |          |            |
                          +-----------------+----------+------------+-----------------+
                          v                 v                       v                 v
                     allocators         containers              concurrency      strings/io/sys
                   (arena, pool)   (vector, map, list,     (mutex, sem, pool,   (str_view, parse,
                                    ring, strbuilder)       atomic SPSC queue)   file, path, log,
                                                                                 time, uuid, fnv1a)
  public_api:
    - "d4np_status_t — status/result enum returned by every fallible function"
    - "d4np_allocator_t — pluggable allocator (alloc/realloc/free) injected into every structure"
    - "d4np_arena_init / d4np_arena_alloc / d4np_arena_reset — O(1) arena allocator"
    - "d4np_pool_init / d4np_pool_alloc / d4np_pool_free — O(1) fixed-block pool"
    - "d4np_vector_t, d4np_hashmap_t, d4np_linked_list_t, d4np_ring_buffer_t, d4np_string_builder_t — generic containers"
    - "d4np_mutex_t, d4np_semaphore_t, d4np_thread_pool_t, d4np_atomic_queue_t — concurrency primitives"
    - "d4np_str_view_t, d4np_str_view_split_next, d4np_str_split, d4np_str_parse_int, d4np_str_parse_float — strings & parsing"
    - "d4np_file_read_all, d4np_file_write_all, d4np_path_combine — file system & I/O"
    - "d4np_log_write, d4np_error_context_push, d4np_error_context_pop, d4np_timestamp_ms, d4np_uuid_generate, d4np_hash_fnv1a — system utilities & diagnostics"
  verification: >
    Unity unit tests per module driven by CTest; ASan + UBSan presets in CI; ThreadSanitizer
    preset over the mutex, semaphore, thread pool, ring buffer, and SPSC atomic queue to prove
    thread-safety; Valgrind leak-check=full over the test binary to prove zero leaks; >=80% line
    coverage via llvm-cov/gcovr; clang-format dry-run and clang-tidy + cppcheck as warnings-as-errors;
    a reproducible benchmark suite (release preset) backing the O(1)/cache-friendly performance
    claims; a C99-pedantic compatibility job is a candidate follow-up for broader reach.
  milestone1_items:
    - "1.1 Stand up the CMake build system (CMakeLists.txt + CMakePresets.json: debug/release/asan/ubsan/tsan/bench) producing the d4np-c library target and the d4np_tests CTest runner."
    - "1.2 Define the foundation contracts: d4np_status_t, d4np_allocator_t (with a default libc-backed allocator), and version.h (D4NP_VERSION_* = 0.0.0)."
    - "1.3 Create the d4np_c.h umbrella public header wiring the per-module headers."
    - "1.4 Implement the first demonstrative slice end-to-end: d4np_str_view_t + d4np_str_view_split_next (zero-allocation tokenization), matching the spec §3 example."
    - "1.5 Seed repo config: .clang-format, .clang-tidy, and a Unity-based unit test for the str_view slice that passes under ASan/UBSan and Valgrind."
